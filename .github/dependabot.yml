version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    # supply-chain safety window: don't adopt freshly published releases
    # until they have been public for a few days
    cooldown:
      default-days: 3
    groups:
      # majors can carry breaking changes (new lint rules, type-resolution
      # shifts) that need manual work, so batch them on their own instead of
      # blocking the safe minor/patch roll-ups
      dependencies-major:
        update-types:
          - major
      dev-dependencies:
        dependency-type: development
        update-types:
          - minor
          - patch
      production-dependencies:
        dependency-type: production
        update-types:
          - minor
          - patch
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    # supply-chain safety window: don't adopt freshly published action
    # releases until they have been public for a few days
    cooldown:
      default-days: 3
    groups:
      github-actions:
        patterns:
          - '*'
