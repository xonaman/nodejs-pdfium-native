version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 99
    # supply-chain safety window: don't adopt freshly published releases
    # until they have been public for a few days
    cooldown:
      default-days: 3
    # hold @types/node at the supported Node major; a types major ahead of the
    # runtime lets code use APIs that don't exist there yet still type-check
    ignore:
      - dependency-name: '@types/node'
        update-types:
          - version-update:semver-major
    groups:
      # group only minor/patch; majors fall through to one individual PR each
      # (Dependabot default). A dedicated majors group is intentionally avoided:
      # an open group PR suppresses the second group's PR
      # (dependabot/dependabot-core#10492)
      dev-dependencies:
        dependency-type: development
        update-types:
          - minor
          - patch
      production-dependencies:
        dependency-type: production
        update-types:
          - minor
          - patch
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    # supply-chain safety window: don't adopt freshly published action
    # releases until they have been public for a few days
    cooldown:
      default-days: 3
    groups:
      github-actions:
        patterns:
          - '*'
