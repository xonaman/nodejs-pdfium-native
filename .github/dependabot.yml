version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    # supply-chain safety window: don't adopt freshly published releases
    # until they have been public for a few days
    cooldown:
      default-days: 3
    groups:
      # isolate the TypeScript toolchain: a major bump needs a manual tsconfig
      # migration, so surface it as its own PR rather than silently ignoring it
      # or letting it block the other dev updates in the group
      typescript-toolchain:
        patterns:
          - typescript
          - '@types/node'
      dev-dependencies:
        dependency-type: development
        exclude-patterns:
          - typescript
          - '@types/node'
      production-dependencies:
        dependency-type: production
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    # supply-chain safety window: don't adopt freshly published action
    # releases until they have been public for a few days
    cooldown:
      default-days: 3
    groups:
      github-actions:
        patterns:
          - '*'
