version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    # supply-chain safety window: don't adopt freshly published releases
    # until they have been public for a few days
    cooldown:
      default-days: 3
    ignore:
      # major toolchain bumps (TypeScript, @types/node) need a manual migration
      # and currently break lint/typecheck; take minor and patch only
      - dependency-name: typescript
        update-types:
          - version-update:semver-major
      - dependency-name: '@types/node'
        update-types:
          - version-update:semver-major
    groups:
      dev-dependencies:
        dependency-type: development
      production-dependencies:
        dependency-type: production
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    # supply-chain safety window: don't adopt freshly published action
    # releases until they have been public for a few days
    cooldown:
      default-days: 3
    groups:
      github-actions:
        patterns:
          - '*'
