name: Prebuild Binaries

on:
  release:
    types: [published]

jobs:
  prebuild:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            arch: x64
          - os: ubuntu-24.04-arm
            platform: linux
            arch: arm64
          - os: macos-latest
            platform: darwin
            arch: arm64
          - os: macos-14
            platform: darwin
            arch: x64
          - os: windows-latest
            platform: win32
            arch: x64
          - os: windows-11-arm
            platform: win32
            arch: arm64
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Download PDFium
        run: node scripts/download-pdfium.mjs

      - name: Build native addon
        run: npx node-gyp rebuild

      - name: Bundle shared library
        run: node scripts/bundle-lib.mjs

      - name: Run tests
        run: npm test

      - name: Create tarball (Unix)
        if: runner.os != 'Windows'
        run: |
          tar czf "pdfium-${{ github.event.release.tag_name }}-${{ matrix.platform }}-${{ matrix.arch }}.tar.gz" build/Release/

      - name: Create tarball (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          tar czf "pdfium-${{ github.event.release.tag_name }}-${{ matrix.platform }}-${{ matrix.arch }}.tar.gz" build/Release/

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" pdfium-*-${{ matrix.platform }}-${{ matrix.arch }}.tar.gz --clobber
        shell: bash

  prebuild-linux-cross:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm
            docker-platform: linux/arm/v7
          - arch: ppc64
            docker-platform: linux/ppc64le
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-qemu-action@v3
        with:
          platforms: ${{ matrix.docker-platform }}

      - name: Build in Docker
        run: |
          docker run --rm --platform ${{ matrix.docker-platform }} \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            node:22-bookworm \
            bash -c "
              apt-get update && apt-get install -y python3 make g++ &&
              npm ci --ignore-scripts &&
              node scripts/download-pdfium.mjs &&
              npx node-gyp rebuild &&
              node scripts/bundle-lib.mjs &&
              npm test
            "

      - name: Create tarball
        run: |
          tar czf "pdfium-${{ github.event.release.tag_name }}-linux-${{ matrix.arch }}.tar.gz" build/Release/

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" pdfium-*-linux-${{ matrix.arch }}.tar.gz --clobber
