name: Prebuild Binaries

on:
  release:
    types: [published]

jobs:
  prebuild:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            arch: x64
          - os: ubuntu-24.04-arm
            platform: linux
            arch: arm64
          - os: macos-latest
            platform: darwin
            arch: arm64
          - os: macos-13
            platform: darwin
            arch: x64
          - os: windows-latest
            platform: win32
            arch: x64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Download PDFium
        run: node scripts/download-pdfium.mjs

      - name: Build native addon
        run: node-gyp rebuild

      - name: Bundle shared library
        run: node scripts/bundle-lib.mjs

      - name: Run tests
        run: npm test

      - name: Create tarball (Unix)
        if: runner.os != 'Windows'
        run: |
          VERSION=$(node -p "require('./package.json').version")
          tar czf "pdfium-v${VERSION}-${{ matrix.platform }}-${{ matrix.arch }}.tar.gz" build/Release/

      - name: Create tarball (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = (node -p "require('./package.json').version")
          tar czf "pdfium-v${version}-${{ matrix.platform }}-${{ matrix.arch }}.tar.gz" build/Release/

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          gh release upload "v${VERSION}" pdfium-v*-${{ matrix.platform }}-${{ matrix.arch }}.tar.gz --clobber
        shell: bash
