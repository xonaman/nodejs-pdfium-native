name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        # windows-2022 pins VS 2022; windows-latest moved to VS 2026 whose MSVC
        # hits an internal compiler error (C1001) building node-addon-api.
        os: [ubuntu-latest, macos-latest, windows-2022]
        node-version: [22, 24]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: npm ci --ignore-scripts
      - run: npm run format:check
      - run: npm run lint:check
      - run: npm run typecheck

      - name: Cache PDFium binaries
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: deps
          key: deps-${{ runner.os }}-${{ hashFiles('scripts/download-pdfium.mjs') }}

      - name: Test install script (source fallback)
        run: node scripts/install.mjs

      - run: npm test

  prebuild:
    needs: test
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            arch: x64
          - os: macos-latest
            platform: darwin
            arch: arm64
          - os: macos-latest
            platform: darwin
            arch: x64
            cross: true
          - os: windows-2022
            platform: win32
            arch: x64
          - os: windows-2022
            platform: win32
            arch: arm64
            cross: true
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Cache PDFium binaries
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: deps
          key: deps-${{ runner.os }}-${{ matrix.arch }}-${{ hashFiles('scripts/download-pdfium.mjs') }}

      - name: Download PDFium
        run: node scripts/download-pdfium.mjs
        env:
          npm_config_arch: ${{ matrix.arch }}

      - name: Build native addon
        run: npx node-gyp rebuild --arch=${{ matrix.arch }}

      - name: Bundle shared library
        run: node scripts/bundle-lib.mjs

      - name: Run tests
        if: ${{ !matrix.cross }}
        run: npm test

      - name: Create tarball
        shell: bash
        run: tar czf "pdfium-${{ github.ref_name }}-${{ matrix.platform }}-${{ matrix.arch }}.tar.gz" build/Release/

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: prebuild-${{ matrix.platform }}-${{ matrix.arch }}
          path: pdfium-*.tar.gz

  prebuild-linux-cross:
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            docker-platform: linux/arm64
            image: node:22-bookworm
          - arch: arm
            docker-platform: linux/arm/v7
            image: node:22-bookworm
          - arch: ppc64
            docker-platform: linux/ppc64le
            image: node:22-bookworm
          - arch: x64
            platform-suffix: musl
            docker-platform: linux/amd64
            image: node:22-alpine
          - arch: arm64
            platform-suffix: musl
            docker-platform: linux/arm64
            image: node:22-alpine
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4
        with:
          platforms: ${{ matrix.docker-platform }}

      - name: Cache PDFium binaries
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: deps
          key: deps-linux-${{ matrix.platform-suffix || 'glibc' }}-${{ matrix.arch }}-${{ hashFiles('scripts/download-pdfium.mjs') }}

      - name: Build in Docker
        timeout-minutes: 60
        run: |
          docker run --rm --platform ${{ matrix.docker-platform }} \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            ${{ matrix.image }} \
            sh -c "
              if command -v apk > /dev/null; then
                apk add --no-cache python3 make g++
              else
                apt-get update && apt-get install -y python3 make g++
              fi &&
              npm ci --ignore-scripts &&
              node scripts/download-pdfium.mjs &&
              npx node-gyp rebuild &&
              node scripts/bundle-lib.mjs &&
              npm test
            "

      - name: Create tarball
        run: |
          suffix="${{ matrix.platform-suffix }}"
          if [ -n "$suffix" ]; then
            tar czf "pdfium-${{ github.ref_name }}-linux-${suffix}-${{ matrix.arch }}.tar.gz" build/Release/
          else
            tar czf "pdfium-${{ github.ref_name }}-linux-${{ matrix.arch }}.tar.gz" build/Release/
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: prebuild-linux-${{ matrix.platform-suffix && format('{0}-', matrix.platform-suffix) || '' }}${{ matrix.arch }}
          path: pdfium-*.tar.gz

  release:
    needs: [prebuild, prebuild-linux-cross]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: npm
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm

      - run: npm ci --ignore-scripts

      - name: Publish to npm
        run: npm publish --provenance

      - name: Download all prebuild artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: prebuild-*
          path: artifacts
          merge-multiple: true

      - name: Attest build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4
        with:
          subject-path: artifacts/*.tar.gz

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "${{ github.ref_name }}" artifacts/*.tar.gz --generate-notes
