name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version: [20, 22, 24]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}

      - run: npm ci
      - run: npm run format:check
      - run: npm run lint:check
      - run: npm test

  prebuild:
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            arch: x64
          - os: ubuntu-24.04-arm
            platform: linux
            arch: arm64
          - os: macos-latest
            platform: darwin
            arch: arm64
          - os: macos-14
            platform: darwin
            arch: x64
          - os: windows-latest
            platform: win32
            arch: x64
          - os: windows-11-arm
            platform: win32
            arch: arm64
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Download PDFium
        run: node scripts/download-pdfium.mjs

      - name: Build native addon
        run: npx node-gyp rebuild

      - name: Bundle shared library
        run: node scripts/bundle-lib.mjs

      - name: Run tests
        run: npm test

      - name: Create tarball (Unix)
        if: runner.os != 'Windows'
        run: tar czf "pdfium-${{ github.ref_name }}-${{ matrix.platform }}-${{ matrix.arch }}.tar.gz" build/Release/

      - name: Create tarball (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: tar czf "pdfium-${{ github.ref_name }}-${{ matrix.platform }}-${{ matrix.arch }}.tar.gz" build/Release/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: prebuild-${{ matrix.platform }}-${{ matrix.arch }}
          path: pdfium-*.tar.gz

  prebuild-linux-cross:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm
            docker-platform: linux/arm/v7
          - arch: ppc64
            docker-platform: linux/ppc64le
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-qemu-action@v3
        with:
          platforms: ${{ matrix.docker-platform }}

      - name: Build in Docker
        run: |
          docker run --rm --platform ${{ matrix.docker-platform }} \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            node:22-bookworm \
            bash -c "
              apt-get update && apt-get install -y python3 make g++ &&
              npm ci --ignore-scripts &&
              node scripts/download-pdfium.mjs &&
              npx node-gyp rebuild &&
              node scripts/bundle-lib.mjs &&
              npm test
            "

      - name: Create tarball
        run: tar czf "pdfium-${{ github.ref_name }}-linux-${{ matrix.arch }}.tar.gz" build/Release/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: prebuild-linux-${{ matrix.arch }}
          path: pdfium-*.tar.gz

  release:
    needs: [prebuild, prebuild-linux-cross]
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - run: npm ci --ignore-scripts

      - name: Publish to npm
        run: npm publish

      - name: Download all prebuild artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: prebuild-*
          path: artifacts
          merge-multiple: true

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "${{ github.ref_name }}" artifacts/*.tar.gz --generate-notes
