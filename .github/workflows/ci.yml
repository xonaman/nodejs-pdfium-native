name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        # windows-2022 pins VS 2022; windows-latest moved to VS 2026 whose MSVC
        # hits an internal compiler error (C1001) building node-addon-api.
        # The windows-canary workflow re-tests windows-latest weekly; drop this
        # pin once it goes green.
        os: [ubuntu-latest, macos-latest, windows-2022]
        node-version: [22, 24, 26]
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: npm ci --ignore-scripts
      - run: npm run format:check
      - run: npm run lint:check
      - run: npm run typecheck

      - name: Cache PDFium binaries
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: deps
          key: deps-${{ runner.os }}-${{ hashFiles('scripts/download-pdfium.mjs', 'scripts/native-deps.json') }}

      - name: Download PDFium and build native addon
        run: |
          node scripts/download-pdfium.mjs
          npx node-gyp rebuild
          node scripts/bundle-lib.mjs

      - run: npm test
